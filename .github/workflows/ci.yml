name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  api-worker-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install API deps
        run: pip install -r apps/api/requirements.txt
      - name: Validate Python files
        run: |
          python -m py_compile apps/api/app/main.py
          python -m py_compile apps/api/app/db.py
          python -m py_compile apps/api/app/schemas.py
          python -m py_compile workers/analyzer/worker.py

  web-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build
